<!DOCTYPE html>
<html lang="pt-BR">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Outback Steakhouse | Clone</title>
  </head>
  <body>
    <script type="module" src="/src/main.js"></script>
    <header class="main-header">
      <div class="header-container">
        <div class="logo">
          <!-- Coloque sua logo na pasta 'public' -->
          <img src="/logo-outback.png" alt="Outback Logo"> 
        </div>
        <div class="search-bar">
          <input type="text" placeholder="Pesquisar">
          <button class="search-btn">🔍</button>
        </div>
        <nav class="nav-menu">
          <a href="#">NOSSOS PRODUTOS</a>
          <a href="#">RESTAURANTES</a>
          <a href="#">ESPERA DIGITAL</a>
          <a href="#">VALE-PRESENTE</a>
          <a href="#">DELIVERY</a>
          <a href="#" class="btn-profile">👤 MEU OUTBACK</a>
        </nav>
      </div>
    </header>

<section class="carousel">
  <div class="carousel-track">
    <img src="/Banner1Recortado.webp" alt="Banner 1">
    <img src="/Banner2Recortado.webp" alt="Banner 2">
  </div>
</section>

<section class="momento-outback">
  <img src="/Detalhe1.jpg" alt="Detalhe" class="divider">
  <div class="title-container">
    <h2>Explore o seu</h2>
    <img src="/MomentoOutback.png" alt="#MomentoOutback" class="hashtag-logo">
  </div>
  
  <div class="menu-items">
    <div class="item">
      <img src="/MenuPrincipal.webp" alt="Menu Principal">
      <p>Menu Principal</p>
    </div>
    <div class="item">
      <img src="/MenuAlmoço.webp" alt="Menu Almoço">
      <p>Menu Almoço</p>
    </div>
    <div class="item">
      <img src="/BillabongHour.webp" alt="Billabong hour">
      <p>Billabong hour</p>
    </div>
    <div class="item">
      <img src="/KidsMenu.webp" alt="Kids menu">
      <p>Kids menu</p>
    </div>
    <div class="item">
      <img src="/Bebidas.webp" alt="Bebidas">
      <p>Bebidas</p>
    </div>
    <div class="item">
      <img src="/Sobremesas.webp" alt="Sobremesas">
      <p>Sobremesas</p>
    </div>
  </div>
</section>

<section class="promocoes-section">
  <div class="multi-carousel">
    <div class="multi-carousel-track">
      <div class="multi-carousel-item"><img src="/1.webp" alt="Promo 1"></div>
      <div class="multi-carousel-item"><img src="/2.webp" alt="Promo 2"></div>
      <div class="multi-carousel-item"><img src="/3.webp" alt="Promo 3"></div>
      <div class="multi-carousel-item"><img src="/4.webp" alt="Promo 4"></div>
      <div class="multi-carousel-item"><img src="/5.webp" alt="Promo 5"></div>
    </div>
    <div class="carousel-dots">
      <span class="dot active"></span>
      <span class="dot"></span>
      <span class="dot"></span>
      <span class="dot"></span>
      <span class="dot"></span>
    </div>
  </div>
</section>

<footer class="main-footer">
  <div class="footer-pattern"></div>
  <div class="footer-bar">
    <p class="footer-alert">SE BEBER, NÃO DIRIJA.</p>
    <p class="footer-law">VENDA E CONSUMO PROIBIDO PARA MENORES DE 18 ANOS</p>
  </div>
</footer>

  </body>
</html>
